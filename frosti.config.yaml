      - href: "https://blog.fanzhuo.xyz" # 链接
        ariaLabel: Support my work # 图标的可访问性标签
        title: Support my work # 图标的悬浮标题
        svg: "ri:cup-line"
      - href: "https://github.com/fanzhuoAWA"
        ariaLabel: Github
        title: Github
        svg: "ri:github-line"
      - href: "https://space.bilibili.com/1269272961"
        ariaLabel: BiliBili
        title: BiliBili
        svg: "ri:bilibili-line"
      - href: "https://x.com/fanzhuoW"
        ariaLabel: X(twitter)
        title: X(twitter)
        svg: "ri:twitter-line"
